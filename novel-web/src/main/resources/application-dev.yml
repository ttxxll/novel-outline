# ===============================
#  开发环境
# ===============================

server:
  port: 8088

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/novel_outline?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

ai:
  provider: deepseek
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:sk-f64b73fb1786421cb5756ed510f2a50a}
    base-url: https://api.deepseek.com
    model: deepseek-v4-pro
    max-tokens: 8192
    temperature: 0.3
  mimo:
    api-key: ${MIMO_API_KEY:}
    base-url: https://api.xiaomimimo.com
    model: mimo-v2.5-pro
    max-tokens: 8192
    temperature: 0.3

server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/novel_outline?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.noveloutline.common.entity
  configuration:
    map-underscore-to-camel-case: true

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: https://api.deepseek.com
  model: deepseek-chat
  max-tokens: 8192
  temperature: 0.3

novel:
  analysis:
    max-retries: 3
    retry-base-delay-ms: 2000

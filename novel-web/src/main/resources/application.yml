# ===============================
#  公共配置 —— 所有 profile 共享
# ===============================

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.noveloutline.common.entity
  configuration:
    map-underscore-to-camel-case: true

novel:
  analysis:
    max-retries: 3
    retry-base-delay-ms: 2000
